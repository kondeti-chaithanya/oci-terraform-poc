name: OCI Terraform PoC

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_region: ${{ secrets.OCI_REGION }}
      TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Create OCI API Key
        run: |
          mkdir -p ~/.oci
          cat <<EOF > ~/.oci/oci_api_key.pem
          ${{ secrets.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Verify OCI Key
        run: |
          ls -l ~/.oci
          head -2 ~/.oci/oci_api_key.pem
          tail -2 ~/.oci/oci_api_key.pem
      - name: Debug OCI Variables
        run: |
          echo "Region=$TF_VAR_region"
          echo "Fingerprint=$TF_VAR_fingerprint"
          echo "User length=${#TF_VAR_user_ocid}"
          echo "Tenancy length=${#TF_VAR_tenancy_ocid}"
          echo "Compartment length=${#TF_VAR_compartment_ocid}"
      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve